name: Jarvis Dining Notifier

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests pytz
      - name: Run dining notifier
        run: python dining.py
